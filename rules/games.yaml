  #  Правила для игр (Mihomo / ClashMeta)
  #
  #  Файл используется как rule-provider type: http
  #  behavior: classical | format: yaml
  #
  #  Способы определения трафика:
  #  1. PROCESS-NAME      — точное имя .exe
  #  2. PROCESS-NAME-REGEX — регулярное выражение
  #  3. DOMAIN-SUFFIX      — домены (DNS, API, CDN)
