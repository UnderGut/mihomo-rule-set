  # трафик должен идти тем же маршрутом.

  # Anti-Cheat Expert (Tencent)
  - PROCESS-NAME,ACE-Service64.exe
  - PROCESS-NAME,SGuard64.exe
  - PROCESS-NAME,SGuardSvc64.exe
  - PROCESS-NAME,SGuardUpdate64.exe

  # BattleEye
  - PROCESS-NAME,BEService.exe
  - PROCESS-NAME,BEService_x64.exe

