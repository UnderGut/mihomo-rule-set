  # ═══════════════════════════════════════════════════════
  #
  #  Мобильные игры (Mihomo / ClashMeta) — ТОЛЬКО iOS / Android
  #
  #  Файл используется как rule-provider type: http
  #  behavior: classical | format: yaml
  #
  #  ⚠️ ТОЛЬКО DOMAIN-SUFFIX (домены игровых серверов/API/CDN).
  #     PROCESS-NAME сюда НЕ кладём: на iOS process-matching не
  #     работает вовсе, на Android процессы = package-имена
  #     (не .exe). Десктопный games.yaml (с .exe) — отдельно.
  #
  #  Подключается ТОЛЬКО в Mihomo-iOS / Mihomo-Android шаблонах
  #  как rule-provider `games-mobile` → группа 🕹️ Игры.
  # ═══════════════════════════════════════════════════════

  # ── 🎴 Гача / RPG (топ мобайла) ──
